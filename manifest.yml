---
applications:
- name: Springboot-KafkaBroker-modernized-springboot-kafka
  memory: 1G
  instances: 1
  buildpacks:
    - java_buildpack
  path: springboot-kafka/target/*.jar
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    SPRING_PROFILES_ACTIVE: cloud
  services:
    - modernized-rabbitmq

